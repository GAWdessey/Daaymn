<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        .text-content {
            width: 45%;
            color: #FFFFFF;
            text-align: left;
        }
        .text-content h1 {
            font-family: 'Pacifico', cursive;
            color: #FC00FF;
            font-size: 80px;
            text-shadow: 0 0 15px rgba(252, 0, 255, 0.7);
            margin: 0 0 20px 0;
        }
        .text-content p {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.3;
        }
        .image-content {
            width: 45%;
        }
        .image-content img {
            width: 100%;
            transform: rotate(8deg) scale(1.4);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="text-content">
            <h1>Daaymn!</h1>
            <p>Your stats don't have feelings. We deliver them cold.</p>
        </div>
        <div class="image-content">
            <img src="screenshot-warning.png" alt="Daaymn Report Card Screen">
        </div>
    </div>
</body>
</html>
