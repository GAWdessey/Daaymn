<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background-color: #000000;
            padding: 80px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .text-content h2 {
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            margin: 0 0 50px 0;
            line-height: 1.2;
        }
        .text-content h2 span {
            font-family: 'Pacifico', cursive;
            color: #FC00FF;
            text-shadow: 0 0 20px rgba(252, 0, 255, 0.7);
        }
        .image-content {
            width: 40%; /* <-- Reduced from 80% */
        }
        .image-content img {
            width: 100%;
            border-radius: 40px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="text-content">
            <h2>No Filter,<br>Just <span>Facts.</span></h2>
        </div>
        <div class="image-content">
            <img src="screenshot-stats.png" alt="Daaymn Deluxe Stats Screen">
        </div>
    </div>
</body>
</html>
