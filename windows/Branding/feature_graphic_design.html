<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daaymn - Feature Graphic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
        }
        .feature-graphic-container {
            width: 1024px;
            height: 500px;
            background-color: #000000;
            padding: 50px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .text-content {
            max-width: 50%;
            text-align: left;
            z-index: 2;
        }
        .text-content h1 {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            margin: 0;
            line-height: 1.1;
        }
        .text-content p {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            margin-top: 20px;
        }
        .text-content p span {
            font-family: 'Pacifico', cursive;
            color: #FC00FF;
            text-shadow: 0 0 15px rgba(252, 0, 255, 0.7);
        }
        .image-container {
            width: 45%;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        .image-container img {
            position: absolute;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            border-radius: 25px;
        }
        .image-verifier {
            width: 80%;
            top: 0;
            left: 0;
            transform: rotate(-6deg);
            z-index: 1;
        }
        .image-badge {
            width: 55%;
            bottom: -10%;
            right: 0;
            transform: rotate(8deg);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="feature-graphic-container">
        <div class="text-content">
            <h1>Authentic &<br>Verified.</h1>
            <p>Get your official score badge and stand out from the crowd. Try <span>Daaymn</span> today.</p>
        </div>
        <div class="image-container">
            <img src="input_images/scoreverifier.PNG" alt="Daaymn Score Verifier" class="image-verifier">
            <img src="input_images/scorebadge.jpg" alt="Daaymn Score Badge" class="image-badge">
        </div>
    </div>
</body>
</html>
