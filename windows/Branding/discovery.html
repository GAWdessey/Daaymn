<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
        }
        .post-container {
            width: 1080px;
            height: 1350px; /* Instagram Portrait Post size */
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .post-container h2 {
            font-size: 110px;
            font-weight: 900;
            color: #fff;
            margin: 0;
            text-align: center;
            z-index: 2;
        }
        .post-container h2 span {
            font-family: 'Pacifico', cursive;
            color: #FC00FF;
            text-shadow: 0 0 20px rgba(252, 0, 255, 0.8);
        }
        .post-container img {
            position: absolute;
            bottom: -20%;
            width: 60%;
            transform: rotate(10deg);
            opacity: 0.5;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <h2>Less Swiping,<br>More <span>'Daaymn'.</span></h2>
        <img src="screenshot-discover.png" alt="Daaymn Discover Screen">
    </div>
</body>
</html>
