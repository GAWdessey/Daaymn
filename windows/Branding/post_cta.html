<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            text-align: center;
        }
        .post-container h1 {
            font-family: 'Pacifico', cursive;
            color: #FC00FF;
            font-size: 180px;
            text-shadow: 0 0 25px rgba(252, 0, 255, 0.8);
            margin: 0;
        }
        .post-container p {
            color: #FFFFFF;
            font-size: 60px;
            font-weight: 700;
            margin: 20px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <h1>Daaymn!</h1>
        <p>Pre-register now.</p>
    </div>
</body>
</html>
