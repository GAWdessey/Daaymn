<svg viewBox="-75.6 0 351.2 200" xmlns="http://www.w3.org/2000/svg" overflow="visible">
  <defs>
    <!-- Green Orb Gradients -->
    <radialGradient id="greenGrad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#c3f7c3;stop-opacity:1"></stop>
      <stop offset="50%" style="stop-color:#5ef55e;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:1"></stop>
    </radialGradient>
    <radialGradient id="greenHighlight" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"></stop>
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.2"></stop>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"></stop>
    </radialGradient>

    <!-- Checkmark Shadow -->
    <filter id="checkShadow" x="-40%" y="-40%" width="180%" height="180%" filterUnits="objectBoundingBox">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"></feGaussianBlur>
      <feOffset dx="0" dy="1.5" result="offsetblur"></feOffset>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"></feFuncA>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Green Orb -->
  <circle cx="100" cy="100" r="80" fill="url(#greenGrad)"></circle>
  <circle cx="100" cy="100" r="80" fill="url(#greenHighlight)"></circle>

  <!-- Checkmark -->
  <path d="M 70,100 L 85,115 L 130,70" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#checkShadow)"></path>
</svg>
