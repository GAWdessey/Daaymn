name: daaymn
description: "A Dating App."
publish_to: 'none'
version: 1.0.0+67

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  dotted_border: ^3.1.0
  markdown_widget: ^2.3.2
  emoji_picker_flutter: ^4.3.0

  # State Management & Dependency Injection
  get_it: ^8.2.0
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Authentication & Security
  local_auth: ^3.0.0
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  basic_utils: ^5.7.0
  google_mlkit_face_detection: ^0.12.0
  camera: ^0.11.3
  qr_flutter: ^4.1.0

  # Media & Files
  image_picker: ^1.0.4
  image: ^4.1.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

  # Location
  location: ^8.0.1
  geolocator: ^14.0.2

  # Supabase
  supabase_flutter: ^2.5.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # Notifications
  flutter_local_notifications: ^19.5.0

  # In-App Purchases
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+8

  # Ads
  google_mobile_ads: ^5.1.0

  # Utilities
  uuid: ^4.5.1
  http: ^1.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.3.1
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  screen_protector: ^1.2.1
  flutter_dotenv: ^5.1.0
  app_links: ^6.4.1
  in_app_update: ^4.1.0

  # Audio
  flutter_sound: ^9.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  # Set a solid background color as a fallback.
  color: "#FC00FF"
  # The branding image in the center.
  image: assets/images/icon.png

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
    - assets/legal/

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
    - family: Bungee
      fonts:
        - asset: assets/fonts/Bungee-Regular.ttf
